<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#EDEDEE"/>
  
  <!-- Image frame -->
  <g transform="translate(200,185)">
    <!-- Outer frame -->
    <rect x="-65" y="-50" width="130" height="100" rx="6" ry="6" 
          fill="none" stroke="#9CA3AF" stroke-width="5" stroke-linejoin="round"/>
    
    <!-- Mountain (large) -->
    <polygon points="-65,50 -15,-10 35,50" fill="#9CA3AF"/>
    
    <!-- Mountain (small) -->
    <polygon points="10,50 45,-5 80,50 65,50" fill="#9CA3AF"/>
    
    <!-- Sun circle -->
    <circle cx="40" cy="-20" r="16" fill="#9CA3AF"/>
  </g>
</svg>
